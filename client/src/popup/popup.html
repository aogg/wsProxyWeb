<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket代理</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>WebSocket代理</h1>
            <div class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="statusText">未连接</span>
            </div>
        </header>

        <!-- 操作按钮区域 -->
        <section class="action-section">
            <button id="startBtn" class="btn btn-success">启动代理</button>
            <button id="stopBtn" class="btn btn-danger" style="display: none;">停止代理</button>
            <button id="connectBtn" class="btn btn-primary">启用连接</button>
            <button id="disconnectBtn" class="btn btn-secondary" style="display: none;">停止连接</button>
            <button id="reconnectBtn" class="btn btn-secondary">重新连接</button>
            <button id="saveConfigBtn" class="btn btn-primary">保存配置</button>
            <button id="resetBtn" class="btn btn-danger">重置配置</button>
        </section>

        <main class="main-content">
            <!-- 登录认证 -->
            <section class="config-section" id="authSection">
                <h2>账号认证</h2>
                <div id="loginForm">
                    <div class="form-group">
                        <label for="authUsername">用户名：</label>
                        <input type="text" id="authUsername" placeholder="请输入用户名" class="input-field" />
                    </div>
                    <div class="form-group">
                        <label for="authPassword">密码：</label>
                        <input type="password" id="authPassword" placeholder="请输入密码" class="input-field" />
                    </div>
                    <button id="loginBtn" class="btn btn-primary">登录</button>
                </div>
                <div id="authInfo" style="display: none;">
                    <div class="form-group">
                        <span>已登录：<strong id="authUserDisplay"></strong></span>
                        <span id="adminBadge" style="display: none; color: #ff9800; margin-left: 8px;">[管理员]</span>
                    </div>
                    <button id="logoutBtn" class="btn btn-secondary">退出登录</button>
                    <button id="changePwdToggle" class="btn btn-secondary">修改密码</button>
                    <button id="userManageToggle" class="btn btn-primary" style="display: none;">用户管理</button>
                </div>
            </section>

            <!-- 修改密码 -->
            <section class="config-section" id="changePwdSection" style="display: none;">
                <h2>修改密码</h2>
                <div class="form-group">
                    <label for="oldPassword">旧密码：</label>
                    <input type="password" id="oldPassword" placeholder="请输入旧密码" class="input-field" />
                </div>
                <div class="form-group">
                    <label for="newPassword">新密码：</label>
                    <input type="password" id="newPassword" placeholder="请输入新密码" class="input-field" />
                </div>
                <div class="form-group">
                    <label for="confirmPassword">确认密码：</label>
                    <input type="password" id="confirmPassword" placeholder="请再次输入新密码" class="input-field" />
                </div>
                <button id="changePwdBtn" class="btn btn-primary">确认修改</button>
                <button id="changePwdCancel" class="btn btn-secondary">取消</button>
            </section>

            <!-- 用户管理（管理员） -->
            <section class="config-section" id="userManageSection" style="display: none;">
                <h2>用户管理</h2>
                <div id="userListContainer">
                    <table class="user-table" id="userTable">
                        <thead><tr><th>用户名</th><th>角色</th><th>操作</th></tr></thead>
                        <tbody id="userTableBody"></tbody>
                    </table>
                </div>
                <h3>添加用户</h3>
                <div class="form-group">
                    <label for="newUsername">用户名：</label>
                    <input type="text" id="newUsername" placeholder="新用户名" class="input-field" />
                </div>
                <div class="form-group">
                    <label for="newUserPassword">密码：</label>
                    <input type="password" id="newUserPassword" placeholder="新用户密码" class="input-field" />
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="newUserIsAdmin" />
                        <span>管理员权限</span>
                    </label>
                </div>
                <button id="addUserBtn" class="btn btn-primary">添加用户</button>
                <button id="userManageClose" class="btn btn-secondary">关闭</button>
            </section>
            <!-- 服务端连接配置 -->
            <section class="config-section">
                <h2>服务端连接</h2>
                <div class="form-group">
                    <label for="websocketUrl">WebSocket地址：</label>
                    <input
                        type="text"
                        id="websocketUrl"
                        class="input-field"
                    />
                </div>
            </section>

            <!-- 加密配置 -->
            <section class="config-section">
                <h2>加密设置</h2>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="cryptoEnabled" />
                        <span>启用加密</span>
                    </label>
                </div>
                <div class="form-group" id="cryptoConfigGroup" style="display: none;">
                    <label for="cryptoKey">加密密钥：</label>
                    <input
                        type="text"
                        id="cryptoKey"
                        placeholder="32字节密钥（Base64）"
                        class="input-field"
                        readonly
                    />
                    <button id="regenerateKeyBtn" class="btn btn-secondary">重新生成密钥</button>
                    <label for="cryptoAlgorithm">加密算法：</label>
                    <select id="cryptoAlgorithm" class="select-field">
                        <option value="aes256gcm">AES-256-GCM</option>
                        <option value="chacha20poly1305">ChaCha20-Poly1305</option>
                    </select>
                </div>
            </section>

            <!-- 压缩配置 -->
            <section class="config-section">
                <h2>压缩设置</h2>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="compressEnabled" />
                        <span>启用压缩</span>
                    </label>
                </div>
                <div class="form-group" id="compressConfigGroup" style="display: none;">
                    <label for="compressLevel">压缩级别：</label>
                    <input 
                        type="range" 
                        id="compressLevel" 
                        min="1" 
                        max="9" 
                        value="6"
                        class="range-field"
                    />
                    <span id="compressLevelValue">6</span>
                    <label for="compressAlgorithm">压缩算法：</label>
                    <select id="compressAlgorithm" class="select-field">
                        <option value="gzip">Gzip</option>
                        <option value="deflate">Deflate</option>
                    </select>
                </div>
            </section>

            <!-- 拦截规则配置 -->
            <section class="config-section">
                <h2>拦截规则</h2>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rulesEnabled" />
                        <span>启用请求拦截</span>
                    </label>
                </div>
                <div class="form-group" id="rulesConfigGroup" style="display: none;">
                    <label for="whitelist">域名白名单（每行一个）：</label>
                    <textarea 
                        id="whitelist" 
                        placeholder="example.com&#10;api.example.com"
                        class="textarea-field"
                        rows="3"
                    ></textarea>
                    <label for="blacklist">域名黑名单（每行一个）：</label>
                    <textarea 
                        id="blacklist" 
                        placeholder="ads.example.com"
                        class="textarea-field"
                        rows="3"
                    ></textarea>
                    <label for="urlPatterns">URL模式（每行一个，支持通配符）：</label>
                    <textarea 
                        id="urlPatterns" 
                        placeholder="https://api.example.com/*&#10;*://*.example.com/api/*"
                        class="textarea-field"
                        rows="3"
                    ></textarea>
                </div>
            </section>

        </main>

        <footer class="footer">
            <div class="connection-info" id="connectionInfo">
                <span>连接时间：<span id="connectionTime">-</span></span>
                <span style="margin-left: 20px;">版本：<span id="version">-</span></span>
            </div>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
