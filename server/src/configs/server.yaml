# WebSocket代理服务端配置文件

# 服务器配置
server:
  port: "8080"  # WebSocket服务器监听端口

# 日志配置
log:
  enabled: true         # 是否启用日志
  level: "debug"         # 日志级别：debug, info, warn, error, fatal
  logDir: "runtime/server/logs"  # 日志目录
  console: true         # 是否输出到控制台
  file: true            # 是否输出到文件
  colorConsole: true    # 控制台是否彩色输出
  maxAgeDays: 30        # 日志保留天数（0表示不清理）

# 认证配置
auth:
  enabled: true              # 是否启用认证
  adminUsername: "admin"     # 管理员用户名
  adminPassword: "admin"  # 管理员初始密码（首次启动后会bcrypt加密存储到users.json）
  userDataDir: "runtime/server/data"  # 用户数据存储目录

# 加密配置
crypto:
  enabled: false  # 是否启用加密（true/false）
  key: ""  # 加密密钥（32字节，Base64编码），如果为空则自动生成（仅用于测试）
  algorithm: "aes256gcm"  # 加密算法：aes256gcm 或 chacha20poly1305

# 压缩配置
compress:
  enabled: false  # 是否启用压缩（true/false）
  level: 6  # 压缩级别：1-9，1最快但压缩率低，9最慢但压缩率高
  algorithm: "gzip"  # 压缩算法：gzip 或 snappy

# 安全控制配置
security:
  enabled: true # 是否启用安全控制
  maxConnections: 50 # 最大连接数（0表示不限制）
  maxMessageBytes: 2097152 # 单条消息最大字节数（0表示不限制，指解密前rawData大小）
  maxRequestBodyBytes: 5242880 # 请求体最大字节数（0表示不限制，指解码后的字节数）
  rateLimitPerSecond: 50 # 每秒允许的请求数（<=0表示不限制）
  rateBurst: 100 # 突发容量（<=0时将按rate自动给默认值）
  allowIPs: [] # 允许IP列表，支持单IP或CIDR（为空表示不限制）
  denyIPs: [] # 拒绝IP列表，支持单IP或CIDR
  allowDomains: [] # 允许域名列表，支持*.example.com（为空表示不限制）
  denyDomains: [] # 拒绝域名列表，支持*.example.com

# HTTP客户端配置（用于服务端转发请求，连接池复用以提升性能）
http:
  timeoutSeconds: 30 # 请求总超时秒数
  maxIdleConns: 200 # 全局最大空闲连接数
  maxIdleConnsPerHost: 50 # 单host最大空闲连接数
  idleConnTimeoutSeconds: 90 # 空闲连接超时秒数
  tlsHandshakeTimeoutSeconds: 10 # TLS握手超时秒数
  expectContinueTimeoutSeconds: 1 # Expect: 100-continue 超时秒数
  proxyEnabled: false # 是否启用正向代理
  proxyURL: "" # 正向代理地址（如：http://proxy.example.com:8080 或 socks5://proxy.example.com:1080）

# 性能优化配置
performance:
  workerPoolSize: 0 # worker池大小（0表示不使用池，每个请求独立goroutine）
  requestQueueSize: 1000 # 请求队列大小
  maxConcurrentConns: 0 # 最大并发连接处理数（0表示不限制）
  bufferPoolSize: 100 # buffer池大小
  chunkSize: 65536 # 分块传输大小（字节），默认64KB
  enableMetrics: true # 是否启用性能指标收集
  metricsIntervalSec: 30 # 指标输出间隔（秒）