version: '3.8'

services:
  ws-proxy-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # 服务器配置
      WS_PROXY_SERVER_HOST: "0.0.0.0"
      WS_PROXY_SERVER_PORT: "8080"

      # 日志配置
      WS_PROXY_LOG_ENABLED: "true"
      WS_PROXY_LOG_LEVEL: "info"
      WS_PROXY_LOG_CONSOLE: "true"
      WS_PROXY_LOG_FILE: "true"

      # 认证配置
      WS_PROXY_AUTH_ENABLED: "true"
      WS_PROXY_AUTH_ADMINUSERNAME: "admin"
      WS_PROXY_AUTH_ADMINPASSWORD: "admin123"

      # 加密配置
      WS_PROXY_CRYPTO_ENABLED: "false"
      WS_PROXY_CRYPTO_ALGORITHM: "aes256gcm"

      # 压缩配置
      WS_PROXY_COMPRESS_ENABLED: "false"
      WS_PROXY_COMPRESS_LEVEL: "6"
      WS_PROXY_COMPRESS_ALGORITHM: "gzip"

      # 安全配置
      WS_PROXY_SECURITY_ENABLED: "true"
      WS_PROXY_SECURITY_MAXCONNECTIONS: "50"
      WS_PROXY_SECURITY_MAXMESSAGEBYTES: "2097152"
      WS_PROXY_SECURITY_MAXREQUESTBODYBYTES: "5242880"
      WS_PROXY_SECURITY_RATELIMITPERSECOND: "50"
      WS_PROXY_SECURITY_RATEBURST: "100"

      # HTTP客户端配置
      WS_PROXY_HTTP_TIMEOUTSECONDS: "30"
      WS_PROXY_HTTP_MAXIDLECONNS: "200"
      WS_PROXY_HTTP_MAXIDLECONNSPERHOST: "50"
      WS_PROXY_HTTP_PROXYENABLED: "false"
      # WS_PROXY_HTTP_PROXYURL: "http://proxy.example.com:8080"

    volumes:
      - ./server/runtime:/app/runtime

    restart: unless-stopped
