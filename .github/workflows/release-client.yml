name: Release Client

on:
  push:
    tags:
      - 'client-v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        working-directory: ./client
        run: |
          npm ci
          npm run build
          cd dist
          zip -r ../wsproxy-client.zip  .

      - uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/wsproxy-client.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
